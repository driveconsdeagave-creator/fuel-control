<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#ffffff"/>
  <!-- Fuel pump body -->
  <rect x="120" y="100" width="200" height="300" rx="20" fill="#cc2222"/>
  <!-- Screen -->
  <rect x="148" y="135" width="144" height="100" rx="10" fill="#ffffff"/>
  <!-- Gauge circle -->
  <circle cx="220" cy="185" r="32" fill="none" stroke="#cc2222" stroke-width="3.5"/>
  <line x1="220" y1="185" x2="242" y2="168" stroke="#cc2222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Display -->
  <rect x="160" y="260" width="120" height="40" rx="6" fill="#991111"/>
  <text x="220" y="286" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">km/L</text>
  <!-- Base -->
  <rect x="140" y="400" width="160" height="24" rx="6" fill="#cc2222"/>
  <rect x="110" y="416" width="220" height="16" rx="4" fill="#991111"/>
  <!-- Nozzle arm -->
  <rect x="320" y="160" width="36" height="14" rx="4" fill="#cc2222"/>
  <rect x="346" y="120" width="14" height="54" rx="4" fill="#cc2222"/>
  <path d="M 360 120 Q 400 120 400 160 L 400 260" fill="none" stroke="#cc2222" stroke-width="10" stroke-linecap="round"/>
  <!-- Nozzle tip -->
  <rect x="392" y="260" width="16" height="40" rx="3" fill="#991111"/>
  <!-- Drops -->
  <ellipse cx="400" cy="318" rx="6" ry="10" fill="#cc2222" opacity="0.6"/>
  <ellipse cx="394" cy="342" rx="4" ry="7" fill="#cc2222" opacity="0.35"/>
  <!-- Hose detail -->
  <circle cx="340" y="167" r="5" fill="#991111"/>
</svg>
