<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#111010"/>
  <g transform="translate(128, 80) scale(0.5)">
    <!-- Fuel pump body -->
    <rect x="60" y="120" width="280" height="400" rx="24" fill="#d4a437" opacity="0.9"/>
    <rect x="90" y="160" width="220" height="140" rx="12" fill="#111010"/>
    <!-- Gauge -->
    <circle cx="200" cy="230" r="40" fill="none" stroke="#d4a437" stroke-width="4"/>
    <line x1="200" y1="230" x2="225" y2="210" stroke="#d4a437" stroke-width="4" stroke-linecap="round"/>
    <!-- Display -->
    <rect x="110" y="330" width="180" height="50" rx="8" fill="#1a1714"/>
    <text x="200" y="362" text-anchor="middle" fill="#d4a437" font-family="monospace" font-size="24" font-weight="bold">km/L</text>
    <!-- Nozzle -->
    <rect x="340" y="180" width="40" height="16" rx="4" fill="#d4a437" opacity="0.7"/>
    <rect x="370" y="140" width="16" height="56" rx="4" fill="#d4a437" opacity="0.7"/>
    <path d="M 386 140 Q 420 140 420 180 L 420 280" fill="none" stroke="#d4a437" opacity="0.7" stroke-width="12" stroke-linecap="round"/>
    <!-- Drops -->
    <ellipse cx="420" cy="310" rx="8" ry="12" fill="#d4a437" opacity="0.5"/>
    <ellipse cx="410" cy="340" rx="6" ry="9" fill="#d4a437" opacity="0.3"/>
  </g>
  <!-- Bottom text -->
  <text x="256" y="460" text-anchor="middle" fill="#d4a437" font-family="sans-serif" font-size="36" font-weight="bold" opacity="0.8">COMBUSTIBLE</text>
</svg>
