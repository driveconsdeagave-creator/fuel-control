<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background -->
  <rect width="512" height="512" rx="80" fill="#ffffff"/>

  <!-- Fuel pump body -->
  <rect x="130" y="110" width="180" height="270" rx="18" fill="#cc2222"/>

  <!-- Screen area (white inset) -->
  <rect x="155" y="140" width="130" height="90" rx="8" fill="#ffffff"/>

  <!-- Gauge needle inside screen -->
  <circle cx="220" cy="185" r="28" fill="none" stroke="#cc2222" stroke-width="3"/>
  <line x1="220" y1="185" x2="240" y2="170" stroke="#cc2222" stroke-width="3" stroke-linecap="round"/>
  <circle cx="220" cy="185" r="4" fill="#cc2222"/>

  <!-- Digital display -->
  <rect x="165" y="260" width="110" height="36" rx="6" fill="#8b1111"/>
  <text x="220" y="284" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="16" font-weight="bold">km/L</text>

  <!-- Pump base -->
  <rect x="150" y="380" width="140" height="20" rx="4" fill="#cc2222"/>
  <rect x="125" y="396" width="190" height="14" rx="4" fill="#8b1111"/>

  <!-- Nozzle connection -->
  <rect x="310" y="165" width="30" height="12" rx="3" fill="#cc2222"/>

  <!-- Hose vertical -->
  <rect x="334" y="130" width="12" height="47" rx="3" fill="#cc2222"/>

  <!-- Hose curve -->
  <path d="M 340 130 C 340 100, 380 100, 380 130 L 380 240" fill="none" stroke="#cc2222" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Nozzle tip -->
  <rect x="374" y="240" width="12" height="50" rx="3" fill="#8b1111"/>
  <rect x="370" y="286" width="20" height="8" rx="2" fill="#cc2222"/>

  <!-- Fuel drops -->
  <path d="M 380 308 Q 383 320 380 328 Q 377 320 380 308 Z" fill="#cc2222" opacity="0.7"/>
  <path d="M 376 338 Q 378 346 376 352 Q 374 346 376 338 Z" fill="#cc2222" opacity="0.4"/>

  <!-- Bottom text -->
  <text x="256" y="460" text-anchor="middle" fill="#cc2222" font-family="Arial,sans-serif" font-size="28" font-weight="bold" letter-spacing="3">COMBUSTIBLE</text>
</svg>
